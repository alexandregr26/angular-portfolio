<article class="community-card">
    <div class="community-media" [class.bottom-priority]="communitybox.title.includes('Orientation Leader') || communitybox.title.includes('Captain')">
        <img src={{communitybox.img}} alt="">
    </div>
    <div class="community-content">
        <h2 class="subtitle">{{communitybox.title}}</h2>
        <p class="date">{{communitybox.date}}</p>
        <p class="mini-description">{{communitybox.description}}</p>
    </div>
</article>
